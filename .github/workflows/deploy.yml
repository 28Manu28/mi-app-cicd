name: CI/CD Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build imagen
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mi-app-cicd:latest .

      - name: Push imagen
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mi-app-cicd:latest